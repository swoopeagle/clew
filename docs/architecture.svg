<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 880" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34497A"/>
    </marker>
    <marker id="arrc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EB6F54"/>
    </marker>
  </defs>

  <rect width="1440" height="880" fill="#FAF6F0"/>

  <!-- Title -->
  <text x="40" y="48" font-size="28" font-weight="bold" fill="#22304F">🧵 Clew — architecture</text>
  <text x="40" y="74" font-size="15" fill="#55617E">A trust-first grant agent for small nonprofits · Slack Agent Builder Challenge, “Agent for Good”</text>

  <!-- ══════════ SLACK WORKSPACE ══════════ -->
  <rect x="40" y="110" width="340" height="580" rx="16" fill="#FFFFFF" stroke="#34497A" stroke-width="2"/>
  <text x="60" y="142" font-size="17" font-weight="bold" fill="#22304F">Slack workspace</text>
  <text x="60" y="162" font-size="12.5" fill="#55617E">where the nonprofit already works</text>

  <rect x="60" y="180" width="300" height="96" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="76" y="206" font-size="14" font-weight="bold" fill="#22304F">💬 Chat — DM / @mention</text>
  <text x="76" y="226" font-size="12" fill="#55617E">“find grants” · paste your website →</text>
  <text x="76" y="243" font-size="12" fill="#55617E">profile drafts itself · live tool statuses</text>
  <text x="76" y="260" font-size="12" fill="#55617E">nav buttons · “clew briefing” · “reset clew”</text>

  <rect x="60" y="290" width="300" height="90" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="76" y="316" font-size="14" font-weight="bold" fill="#22304F">🏠 App Home</text>
  <text x="76" y="336" font-size="12" fill="#55617E">pipeline funnel · grant board · deadline flags</text>
  <text x="76" y="353" font-size="12" fill="#55617E">🔒 “What Clew can see” transparency panel</text>

  <rect x="60" y="394" width="300" height="127" rx="10" fill="#FAF6F0" stroke="#EB6F54" stroke-width="1.6"/>
  <text x="76" y="420" font-size="14" font-weight="bold" fill="#22304F">📂 War rooms — #grant-…</text>
  <text x="76" y="440" font-size="12" fill="#55617E">created on Approve · topic: 📅 due · 💰 size</text>
  <text x="76" y="457" font-size="12" fill="#55617E">pinned brief: apply link · criteria · contact ·</text>
  <text x="76" y="474" font-size="12" fill="#55617E">eligibility analysis · grant-aware @clew help</text>
  <text x="76" y="491" font-size="12" fill="#55617E">🧩 task board — hand work to teammates</text>
  <text x="76" y="508" font-size="12" fill="#55617E">📄 competitive draft in the channel canvas</text>

  <rect x="60" y="535" width="300" height="72" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="76" y="561" font-size="14" font-weight="bold" fill="#22304F">📋 Modals</text>
  <text x="76" y="581" font-size="12" fill="#55617E">org profile with ✨ AI form-fill · deadlines</text>
  <text x="76" y="598" font-size="12" fill="#55617E">award / retro capture</text>

  <text x="60" y="643" font-size="12" fill="#8B93A7">Approve / Pass buttons are the human gate —</text>
  <text x="60" y="660" font-size="12" fill="#8B93A7">the agent proposes, people decide.</text>

  <!-- ══════════ RAILWAY ══════════ -->
  <rect x="480" y="80" width="460" height="650" rx="16" fill="#FFFFFF" stroke="#34497A" stroke-width="2"/>
  <text x="500" y="112" font-size="17" font-weight="bold" fill="#22304F">Railway container — 24/7 cloud host</text>

  <rect x="500" y="128" width="420" height="76" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="516" y="153" font-size="14" font-weight="bold" fill="#22304F">Bolt for Python</text>
  <text x="516" y="173" font-size="12" fill="#55617E">Socket Mode ⇄ Slack · OAuth /slack/install</text>
  <text x="516" y="190" font-size="12" fill="#55617E">board API /api/board (bearer-auth) — one port</text>

  <rect x="500" y="218" width="420" height="76" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="516" y="243" font-size="14" font-weight="bold" fill="#22304F">Claude agent — Claude Agent SDK</text>
  <text x="516" y="263" font-size="12" fill="#55617E">per-thread sessions · org + war-room context injected</text>
  <text x="516" y="280" font-size="12" fill="#55617E">file/shell built-ins disabled — MCP tools + WebSearch only</text>

  <rect x="500" y="308" width="420" height="140" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="516" y="333" font-size="14" font-weight="bold" fill="#22304F">Custom MCP server — “clew-grant-tools” (11 tools)</text>
  <text x="516" y="355" font-size="11.5" fill="#55617E">search_grants_gov · search_propublica_orgs · get_990_filings</text>
  <text x="516" y="372" font-size="11.5" fill="#55617E">search_usaspending · get_org_award_history · search_workspace</text>
  <text x="516" y="389" font-size="11.5" fill="#55617E">fetch_org_website · fetch_webpage · save_org_profile</text>
  <text x="516" y="406" font-size="11.5" fill="#55617E">assign_grant_task · save_qualified_prospect (the gate ↓)</text>
  <text x="516" y="423" font-size="11" fill="#8B93A7">+ built-in WebSearch → crawls funder sites: apply links, contacts</text>
  <text x="516" y="440" font-size="11" fill="#8B93A7">every call: 15 s timeout · graceful “unavailable”</text>

  <rect x="500" y="462" width="420" height="82" rx="10" fill="#FDEAE5" stroke="#EB6F54" stroke-width="2"/>
  <text x="516" y="488" font-size="14" font-weight="bold" fill="#B0341B">🔒 Enforced trust boundary</text>
  <text x="516" y="508" font-size="12" fill="#55617E">save_qualified_prospect REJECTS any prospect whose</text>
  <text x="516" y="525" font-size="12" fill="#55617E">citation isn’t a URL a search tool actually returned.</text>

  <rect x="500" y="558" width="420" height="72" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="516" y="583" font-size="14" font-weight="bold" fill="#22304F">SQLite on persistent volume /app/data</text>
  <text x="516" y="603" font-size="12" fill="#55617E">org profiles · prospects + lifecycle · tasks · canvas links</text>
  <text x="516" y="620" font-size="12" fill="#55617E">agent sessions + OAuth install — survive every deploy</text>

  <rect x="500" y="644" width="420" height="80" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="516" y="669" font-size="14" font-weight="bold" fill="#22304F">🌅 Proactive briefing loop</text>
  <text x="516" y="689" font-size="12" fill="#55617E">daily 9 a.m. pipeline digest — deadlines, reviews, tasks</text>
  <text x="516" y="706" font-size="12" fill="#55617E">+ war-room nudges: due ≤3 days / unowned work (@mentions)</text>

  <!-- ══════════ DATA SOURCES ══════════ -->
  <rect x="1030" y="80" width="370" height="300" rx="16" fill="#FFFFFF" stroke="#34497A" stroke-width="2"/>
  <text x="1050" y="112" font-size="17" font-weight="bold" fill="#22304F">Free public data</text>
  <text x="1050" y="132" font-size="12.5" fill="#55617E">every result carries a clickable citation</text>

  <rect x="1050" y="150" width="330" height="50" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="1066" y="181" font-size="13.5" fill="#22304F"><tspan font-weight="bold">Grants.gov</tspan> — open federal opportunities</text>

  <rect x="1050" y="212" width="330" height="50" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="1066" y="243" font-size="13.5" fill="#22304F"><tspan font-weight="bold">ProPublica</tspan> — foundations’ IRS 990s</text>

  <rect x="1050" y="274" width="330" height="50" rx="10" fill="#FAF6F0" stroke="#C9CFDD"/>
  <text x="1066" y="298" font-size="13.5" fill="#22304F"><tspan font-weight="bold">USAspending</tspan> — real awards +</text>
  <text x="1066" y="316" font-size="13" fill="#22304F">any org’s own funding history</text>

  <text x="1050" y="352" font-size="12.5" fill="#55617E">+ the org’s own website (profile autofill) + any funder’s</text>
  <text x="1050" y="369" font-size="12.5" fill="#55617E">site, crawled for real apply links, criteria &amp; contacts</text>

  <!-- ══════════ REAL-TIME SEARCH ══════════ -->
  <rect x="1030" y="416" width="370" height="96" rx="16" fill="#FFFFFF" stroke="#34497A" stroke-width="2"/>
  <text x="1050" y="448" font-size="16" font-weight="bold" fill="#22304F">Slack Real-Time Search API</text>
  <text x="1050" y="470" font-size="12.5" fill="#55617E">warm-path detection: has the team already talked</text>
  <text x="1050" y="487" font-size="12.5" fill="#55617E">about this funder? (OAuth user token)</text>

  <!-- ══════════ VERCEL ══════════ -->
  <rect x="1030" y="548" width="370" height="142" rx="16" fill="#FFFFFF" stroke="#34497A" stroke-width="2"/>
  <text x="1050" y="580" font-size="16" font-weight="bold" fill="#22304F">Vercel — Next.js web board</text>
  <text x="1050" y="602" font-size="12.5" fill="#55617E">live kanban mirror of the same pipeline for board</text>
  <text x="1050" y="619" font-size="12.5" fill="#55617E">members without Slack · polls every 15 s</text>
  <text x="1050" y="641" font-size="12.5" fill="#55617E">task-progress chips · countdowns in sync with Slack</text>
  <text x="1050" y="663" font-size="12.5" fill="#B0341B" font-weight="bold">access: signed per-org HMAC links only,</text>
  <text x="1050" y="680" font-size="12.5" fill="#B0341B" font-weight="bold">handed out inside that org’s Slack</text>

  <!-- ══════════ ARROWS ══════════ -->
  <!-- Slack <-> Railway -->
  <line x1="382" y1="300" x2="478" y2="300" stroke="#34497A" stroke-width="2.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text x="430" y="288" font-size="11.5" fill="#34497A" text-anchor="middle" font-weight="bold">Socket Mode</text>
  <text x="430" y="320" font-size="10.5" fill="#8B93A7" text-anchor="middle">events · Block Kit</text>

  <!-- briefing -> Slack -->
  <path d="M 498 677 C 440 677, 420 640, 382 610" fill="none" stroke="#EB6F54" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="398" y="714" font-size="11.5" fill="#EB6F54" font-weight="bold">unprompted 9 a.m. briefing</text>

  <!-- MCP -> data sources -->
  <line x1="922" y1="360" x2="1028" y2="240" stroke="#34497A" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="958" y="270" font-size="11.5" fill="#34497A" text-anchor="end" font-weight="bold">search / fetch</text>
  <text x="958" y="286" font-size="10.5" fill="#8B93A7" text-anchor="end">cited results</text>

  <!-- MCP -> real-time search -->
  <line x1="922" y1="400" x2="1028" y2="458" stroke="#34497A" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="948" y="446" font-size="11.5" fill="#34497A" text-anchor="end" font-weight="bold">search_workspace</text>

  <!-- SQLite -> Vercel -->
  <line x1="922" y1="594" x2="1028" y2="614" stroke="#34497A" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="975" y="576" font-size="11.5" fill="#34497A" text-anchor="middle" font-weight="bold">/api/board</text>
  <text x="1005" y="640" font-size="10.5" fill="#8B93A7" text-anchor="middle">bearer token</text>

  <!-- Footer -->
  <text x="40" y="790" font-size="13" fill="#55617E">The agent proposes → a human approves → a war room + brief materialize → the same SQLite state renders everywhere:</text>
  <text x="40" y="810" font-size="13" fill="#55617E">shortlist cards, App Home board, morning briefing, and the web board are all views over one table.</text>
  <text x="40" y="846" font-size="12" fill="#8B93A7">Stack: Slack Bolt (Python, async) · Claude Agent SDK (Sonnet 5 / Opus 4.8) · custom MCP server · SQLite · Docker on Railway · Next.js 16 on Vercel · 76 tests</text>
</svg>
