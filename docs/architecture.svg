<svg viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a5568"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a0aec0"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="760" fill="#ffffff"/>

  <text x="30" y="38" font-size="24" font-weight="700" fill="#1a202c">Clew — architecture</text>
  <text x="30" y="60" font-size="13" fill="#718096">Slack Agent Builder Challenge — Agent for Good</text>

  <!-- Slack Workspace -->
  <rect x="30" y="90" width="270" height="230" rx="10" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="50" y="118" font-size="15" font-weight="700" fill="#2d3748">Slack Workspace</text>

  <rect x="50" y="134" width="230" height="46" rx="6" fill="#ffffff" stroke="#cbd5e0"/>
  <text x="65" y="153" font-size="12.5" fill="#2d3748">App Home — org profile,</text>
  <text x="65" y="168" font-size="12.5" fill="#2d3748">Find Grants button, Grant Board</text>

  <rect x="50" y="188" width="230" height="36" rx="6" fill="#ffffff" stroke="#cbd5e0"/>
  <text x="65" y="211" font-size="12.5" fill="#2d3748">DM / @mention (natural language)</text>

  <rect x="50" y="232" width="230" height="60" rx="6" fill="#ebf8ff" stroke="#90cdf4"/>
  <text x="65" y="252" font-size="12.5" font-weight="700" fill="#2c5282">Shortlist Card (Block Kit)</text>
  <text x="65" y="268" font-size="12" fill="#2c5282">fit rationale + cited sources</text>
  <text x="65" y="282" font-size="12" fill="#2c5282">[ Approve ]   [ Pass ]  ← human gate</text>

  <!-- Bolt App -->
  <rect x="350" y="90" width="230" height="120" rx="10" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="370" y="118" font-size="15" font-weight="700" fill="#2d3748">Bolt for Python</text>
  <text x="370" y="138" font-size="12.5" fill="#4a5568">Socket Mode</text>
  <text x="370" y="158" font-size="12.5" fill="#4a5568">listeners/events</text>
  <text x="370" y="176" font-size="12.5" fill="#4a5568">listeners/actions</text>
  <text x="370" y="194" font-size="12.5" fill="#4a5568">listeners/views</text>

  <!-- Claude Agent SDK -->
  <rect x="350" y="250" width="230" height="120" rx="10" fill="#faf5ff" stroke="#d6bcfa" stroke-width="1.5"/>
  <text x="370" y="278" font-size="15" font-weight="700" fill="#44337a">Claude Agent SDK</text>
  <text x="370" y="300" font-size="12.5" fill="#553c9a">agent/agent.py</text>
  <text x="370" y="318" font-size="12" fill="#553c9a">system prompt: screen for real</text>
  <text x="370" y="333" font-size="12" fill="#553c9a">fit, cite sources, flag doubt,</text>
  <text x="370" y="348" font-size="12" fill="#553c9a">never fabricate</text>

  <!-- MCP Server -->
  <rect x="660" y="90" width="280" height="330" rx="10" fill="#fffaf0" stroke="#fbd38d" stroke-width="1.5"/>
  <text x="680" y="118" font-size="15" font-weight="700" fill="#7b341e">MCP Server — clew-grant-tools</text>
  <text x="680" y="136" font-size="11.5" fill="#975a16">(required tech: MCP server integration)</text>

  <rect x="680" y="150" width="240" height="30" rx="5" fill="#ffffff" stroke="#f6ad55"/>
  <text x="692" y="170" font-size="12" fill="#2d3748">search_grants_gov</text>

  <rect x="680" y="186" width="240" height="30" rx="5" fill="#ffffff" stroke="#f6ad55"/>
  <text x="692" y="206" font-size="12" fill="#2d3748">search_propublica_orgs</text>

  <rect x="680" y="222" width="240" height="30" rx="5" fill="#ffffff" stroke="#f6ad55"/>
  <text x="692" y="242" font-size="12" fill="#2d3748">get_990_filings</text>

  <rect x="680" y="258" width="240" height="30" rx="5" fill="#ffffff" stroke="#f6ad55"/>
  <text x="692" y="278" font-size="12" fill="#2d3748">search_usaspending</text>

  <rect x="680" y="294" width="240" height="30" rx="5" fill="#ffffff" stroke="#a0aec0" stroke-dasharray="3,2"/>
  <text x="692" y="314" font-size="12" fill="#4a5568">search_workspace (Real-Time Search)</text>

  <rect x="680" y="336" width="240" height="66" rx="6" fill="#c6f6d5" stroke="#68d391"/>
  <text x="692" y="356" font-size="12.5" font-weight="700" fill="#22543d">save_qualified_prospect</text>
  <text x="692" y="372" font-size="11.5" fill="#22543d">trust boundary — requires a real</text>
  <text x="692" y="386" font-size="11.5" fill="#22543d">citation for every claim</text>

  <!-- External APIs -->
  <rect x="1000" y="90" width="150" height="330" rx="10" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1.5"/>
  <text x="1015" y="115" font-size="13" font-weight="700" fill="#22543d">Free public APIs</text>

  <rect x="1015" y="150" width="120" height="30" rx="5" fill="#ffffff" stroke="#9ae6b4"/>
  <text x="1025" y="170" font-size="11" fill="#2d3748">Grants.gov</text>

  <rect x="1015" y="196" width="120" height="46" rx="5" fill="#ffffff" stroke="#9ae6b4"/>
  <text x="1025" y="214" font-size="11" fill="#2d3748">ProPublica</text>
  <text x="1025" y="228" font-size="11" fill="#2d3748">Nonprofit Explorer</text>

  <rect x="1015" y="258" width="120" height="30" rx="5" fill="#ffffff" stroke="#9ae6b4"/>
  <text x="1025" y="278" font-size="11" fill="#2d3748">USAspending.gov</text>

  <rect x="1015" y="294" width="120" height="30" rx="5" fill="#ffffff" stroke="#a0aec0" stroke-dasharray="3,2"/>
  <text x="1022" y="314" font-size="10.5" fill="#4a5568">Slack workspace</text>

  <!-- SQLite -->
  <rect x="350" y="430" width="280" height="110" rx="10" fill="#ebf4ff" stroke="#a3bffa" stroke-width="1.5"/>
  <text x="370" y="458" font-size="15" font-weight="700" fill="#2a4365">SQLite — storage/db.py</text>
  <text x="370" y="480" font-size="12" fill="#2c5282">org_profile</text>
  <text x="370" y="498" font-size="12" fill="#2c5282">prospects (single source of truth —</text>
  <text x="370" y="514" font-size="12" fill="#2c5282">stage machine drives every view)</text>

  <!-- Lifecycle stages strip -->
  <rect x="30" y="580" width="1120" height="150" rx="10" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="50" y="608" font-size="15" font-weight="700" fill="#2d3748">Grant Board — one table, one stage machine</text>

  <g font-size="12" fill="#2d3748">
    <rect x="50" y="626" width="130" height="40" rx="6" fill="#fff" stroke="#cbd5e0"/>
    <text x="60" y="650" font-size="12">qualified</text>

    <rect x="200" y="626" width="130" height="40" rx="6" fill="#fff" stroke="#cbd5e0"/>
    <text x="210" y="650" font-size="12">approved</text>
    <text x="210" y="663" font-size="10" fill="#718096">+ deadline</text>

    <rect x="350" y="626" width="130" height="40" rx="6" fill="#fff" stroke="#cbd5e0"/>
    <text x="360" y="650" font-size="12">applied</text>

    <rect x="500" y="626" width="130" height="40" rx="6" fill="#fff" stroke="#cbd5e0"/>
    <text x="510" y="650" font-size="12">submitted</text>

    <rect x="650" y="626" width="150" height="40" rx="6" fill="#c6f6d5" stroke="#68d391"/>
    <text x="660" y="650" font-size="12">awarded</text>
    <text x="660" y="663" font-size="10" fill="#22543d">+ report due date</text>

    <rect x="820" y="626" width="130" height="40" rx="6" fill="#fed7d7" stroke="#fc8181"/>
    <text x="830" y="650" font-size="12">declined</text>

    <rect x="970" y="626" width="130" height="40" rx="6" fill="#fff" stroke="#cbd5e0"/>
    <text x="980" y="650" font-size="12">passed</text>
  </g>
  <text x="50" y="700" font-size="11.5" fill="#718096">awarded / declined transitions both open an org-learning retro modal — captures why, for next time</text>
  <text x="50" y="716" font-size="11.5" fill="#718096">(warm-path hint from search_workspace shown when OAuth is connected)</text>

  <!-- Arrows -->
  <line x1="300" y1="152" x2="350" y2="140" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="206" x2="350" y2="160" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="310" x2="300" y2="262" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

