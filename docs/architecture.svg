<svg viewBox="0 0 1120 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8a9a"/>
    </marker>
    <style>
      .title { font-size: 27px; font-weight: 700; fill: #17173a; }
      .sub   { font-size: 14px; fill: #5b5b6b; }
      .hdr   { font-size: 15px; font-weight: 700; }
      .chiptxt { font-size: 12.5px; fill: #22223b; }
      .small { font-size: 11.5px; fill: #22223b; }
      .note  { font-size: 12.5px; fill: #7a5a10; font-weight: 600; }
      .flowlbl { font-size: 11.5px; fill: #7b7b8b; }
      .flow  { stroke: #8a8a9a; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1120" height="760" fill="#ffffff"/>
  <text x="40" y="42" class="title">Clew — architecture</text>
  <text x="40" y="66" class="sub">Slack-native grant agent · Claude Agent SDK + a custom MCP server over free public data</text>

  <!-- Layer 1: Slack surfaces -->
  <rect x="40" y="86" width="1040" height="104" rx="14" fill="#f4eaf5" stroke="#6b2b6f" stroke-width="1.5"/>
  <text x="58" y="110" class="hdr" fill="#6b2b6f">① People in Slack</text>
  <g>
    <rect x="58" y="126" width="190" height="46" rx="8" fill="#ffffff" stroke="#6b2b6f" stroke-width="1.1"/>
    <text x="153" y="154" class="chiptxt" text-anchor="middle">Assistant DM</text>
    <rect x="262" y="126" width="190" height="46" rx="8" fill="#ffffff" stroke="#6b2b6f" stroke-width="1.1"/>
    <text x="357" y="154" class="chiptxt" text-anchor="middle">@mention in channels</text>
    <rect x="466" y="126" width="190" height="46" rx="8" fill="#ffffff" stroke="#6b2b6f" stroke-width="1.1"/>
    <text x="561" y="154" class="chiptxt" text-anchor="middle">App Home · board</text>
    <rect x="670" y="126" width="190" height="46" rx="8" fill="#ffffff" stroke="#6b2b6f" stroke-width="1.1"/>
    <text x="765" y="154" class="chiptxt" text-anchor="middle">#grant-… war rooms</text>
    <rect x="874" y="126" width="188" height="46" rx="8" fill="#ffffff" stroke="#6b2b6f" stroke-width="1.1"/>
    <text x="968" y="154" class="chiptxt" text-anchor="middle">Block Kit cards &amp; modals</text>
  </g>

  <line x1="300" y1="190" x2="300" y2="212" class="flow" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="312" y="205" class="flowlbl">events ↓ · Block Kit UI ↑</text>

  <!-- Layer 2: Bolt app -->
  <rect x="40" y="212" width="1040" height="94" rx="14" fill="#e6f7f2" stroke="#158a70" stroke-width="1.5"/>
  <text x="58" y="236" class="hdr" fill="#158a70">② Clew · Bolt for Python (Socket Mode + OAuth)</text>
  <rect x="58" y="248" width="496" height="46" rx="8" fill="#ffffff" stroke="#158a70" stroke-width="1.1"/>
  <text x="306" y="276" class="chiptxt" text-anchor="middle">Event &amp; action listeners</text>
  <rect x="568" y="248" width="494" height="46" rx="8" fill="#ffffff" stroke="#158a70" stroke-width="1.1"/>
  <text x="815" y="276" class="chiptxt" text-anchor="middle">Block Kit builders — cards · brief · funnel board · trust panel</text>

  <line x1="300" y1="306" x2="300" y2="330" class="flow" marker-end="url(#arr)"/>

  <!-- Layer 3: Agent SDK (left) -->
  <rect x="40" y="330" width="560" height="102" rx="14" fill="#e8f0fe" stroke="#3157b8" stroke-width="1.5"/>
  <text x="58" y="354" class="hdr" fill="#3157b8">③ Claude Agent SDK · Opus 4.8</text>
  <rect x="58" y="368" width="250" height="46" rx="8" fill="#ffffff" stroke="#3157b8" stroke-width="1.1"/>
  <text x="183" y="396" class="chiptxt" text-anchor="middle">Per-thread sessions</text>
  <rect x="322" y="368" width="262" height="46" rx="8" fill="#ffffff" stroke="#3157b8" stroke-width="1.1"/>
  <text x="453" y="390" class="small" text-anchor="middle">🔒 Lockdown: built-in</text>
  <text x="453" y="406" class="small" text-anchor="middle">fs / shell / web tools disallowed</text>

  <!-- SQLite (right of SDK) -->
  <rect x="620" y="330" width="196" height="102" rx="14" fill="#f0eefb" stroke="#6a4fb0" stroke-width="1.5"/>
  <text x="636" y="354" class="hdr" fill="#6a4fb0">SQLite</text>
  <text x="636" y="378" class="small">clew.db</text>
  <text x="636" y="396" class="small">org profile +</text>
  <text x="636" y="412" class="small">prospect pipeline</text>
  <line x1="600" y1="381" x2="618" y2="381" class="flow" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Web board (far right) -->
  <rect x="836" y="330" width="244" height="102" rx="14" fill="#eafaf0" stroke="#2a9d55" stroke-width="1.5"/>
  <text x="852" y="354" class="hdr" fill="#2a9d55">Web board</text>
  <text x="852" y="376" class="small">webapi :3001 (bearer)</text>
  <text x="852" y="394" class="small">→ cloudflared → Vercel / Next.js</text>
  <text x="852" y="412" class="small">signed per-org HMAC links</text>
  <line x1="816" y1="381" x2="834" y2="381" class="flow" marker-end="url(#arr)"/>

  <line x1="300" y1="432" x2="300" y2="466" class="flow" marker-end="url(#arr)"/>
  <text x="312" y="452" class="flowlbl">tool calls</text>

  <!-- Layer 4: MCP server -->
  <rect x="40" y="466" width="1040" height="158" rx="14" fill="#fdf3e0" stroke="#c9821b" stroke-width="1.5"/>
  <text x="58" y="490" class="hdr" fill="#c9821b">④ Custom MCP server · clew-grant-tools (9 tools)</text>
  <!-- row 1 -->
  <g class="small">
    <rect x="58" y="502" width="190" height="30" rx="7" fill="#ffffff" stroke="#c9821b" stroke-width="1"/>
    <text x="153" y="522" text-anchor="middle">search_grants_gov</text>
    <rect x="262" y="502" width="190" height="30" rx="7" fill="#ffffff" stroke="#c9821b" stroke-width="1"/>
    <text x="357" y="522" text-anchor="middle">search_propublica_orgs</text>
    <rect x="466" y="502" width="190" height="30" rx="7" fill="#ffffff" stroke="#c9821b" stroke-width="1"/>
    <text x="561" y="522" text-anchor="middle">get_990_filings</text>
    <rect x="670" y="502" width="190" height="30" rx="7" fill="#ffffff" stroke="#c9821b" stroke-width="1"/>
    <text x="765" y="522" text-anchor="middle">search_usaspending</text>
    <rect x="874" y="502" width="188" height="30" rx="7" fill="#ffffff" stroke="#c9821b" stroke-width="1"/>
    <text x="968" y="522" text-anchor="middle">get_org_award_history</text>
  </g>
  <!-- row 2 -->
  <g class="small">
    <rect x="58" y="540" width="242" height="30" rx="7" fill="#ffffff" stroke="#c9821b" stroke-width="1"/>
    <text x="179" y="560" text-anchor="middle">search_workspace · Real-Time Search</text>
    <rect x="314" y="540" width="242" height="30" rx="7" fill="#fff3ce" stroke="#d9a521" stroke-width="1.8"/>
    <text x="435" y="560" text-anchor="middle" font-weight="700">⭐ save_qualified_prospect</text>
    <rect x="570" y="540" width="242" height="30" rx="7" fill="#ffffff" stroke="#c9821b" stroke-width="1"/>
    <text x="691" y="560" text-anchor="middle">save_org_profile</text>
    <rect x="826" y="540" width="236" height="30" rx="7" fill="#ffffff" stroke="#c9821b" stroke-width="1"/>
    <text x="944" y="560" text-anchor="middle">fetch_org_website</text>
  </g>
  <text x="560" y="600" class="note" text-anchor="middle">🔒 save_qualified_prospect is the ONLY path to the shortlist — it rejects any prospect whose citations aren't real source URLs. No citation, no shortlist.</text>

  <line x1="300" y1="624" x2="300" y2="652" class="flow" marker-end="url(#arr)"/>

  <!-- Layer 5: data sources -->
  <rect x="40" y="652" width="1040" height="76" rx="14" fill="#eef1f4" stroke="#556173" stroke-width="1.5"/>
  <text x="58" y="678" class="hdr" fill="#556173">⑤ Free, keyless data sources</text>
  <g class="small">
    <rect x="330" y="683" width="164" height="30" rx="7" fill="#ffffff" stroke="#556173" stroke-width="1"/>
    <text x="412" y="703" text-anchor="middle">Grants.gov</text>
    <rect x="506" y="683" width="164" height="30" rx="7" fill="#ffffff" stroke="#556173" stroke-width="1"/>
    <text x="588" y="703" text-anchor="middle">ProPublica 990</text>
    <rect x="682" y="683" width="164" height="30" rx="7" fill="#ffffff" stroke="#556173" stroke-width="1"/>
    <text x="764" y="703" text-anchor="middle">USAspending</text>
    <rect x="858" y="683" width="204" height="30" rx="7" fill="#ffffff" stroke="#556173" stroke-width="1"/>
    <text x="960" y="703" text-anchor="middle">Slack workspace search</text>
  </g>
</svg>
