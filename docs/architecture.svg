  <line x1="920" y1="237" x2="1000" y2="219" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="920" y1="273" x2="1000" y2="273" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="920" y1="309" x2="1000" y2="309" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDashed)"/>

  <line x1="800" y1="402" x2="465" y2="430" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="465" y1="210" x2="465" y2="250" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="430" x2="440" y2="220" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="446" y="330" font-size="10.5" fill="#718096">board reads / org profile CRUD</text>

  <line x1="490" y1="540" x2="490" y2="580" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
